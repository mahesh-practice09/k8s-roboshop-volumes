---
apiVersion: v1 
kind: Service
metadata:
  name: mongodb-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
      project: roboshop 
      tier: db
      component: mongodb
  ports:
    - protocol: TCP 
      port: 27017  # Service Port
      targetPort: 27017 # Container Port
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels: 
    project: roboshop 
    tier: db
    component: mongodb
spec:
  serviceName: "mongodb-headless"  # we should headless service
  replicas: 3
  selector:
    matchLabels:
      project: roboshop 
      tier: db
      component: mongodb
  template:
    metadata:
      labels:
          project: roboshop 
          tier: db
          component: mongodb
    spec:
      containers:
      - name: mongodb
        image: mahesh050917/mongodb:1.0.0
        volumeMounts:
        - name: mongodb
          mountPath: /data/db
  # PVC
  volumeClaimTemplates:
  - metadata:
      name: mongodb
    spec:
      accessModes: [ "ReadWriteOnce" ]
      StorageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1 
kind: Service 
metadata:
  name: mongodb
  namespace: roboshop
spec:
  selector:
      project: roboshop 
      tier: db
      component: mongodb
  ports:
    - protocol: TCP 
      port: 27017  # Service Port
      targetPort: 27017 # Container Port